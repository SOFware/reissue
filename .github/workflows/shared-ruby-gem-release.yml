name: Shared Ruby Gem Release

on:
  workflow_call:
    inputs:
      git_user_email:
        description: 'Git user email for commits'
        required: false
        type: string
        default: 'github-actions[bot]@users.noreply.github.com'
      git_user_name:
        description: 'Git user name for commits'
        required: false
        type: string
        default: 'github-actions[bot]'
      dry_run:
        description: 'Test workflow without publishing to RubyGems'
        required: false
        type: boolean
        default: false
      ruby_version:
        description: 'Ruby version to use (defaults to .ruby-version or .tool-versions file)'
        required: false
        type: string
      working_directory:
        description: 'Directory containing the gem (for monorepos)'
        required: false
        type: string
        default: '.'
    outputs:
      version:
        description: 'The version that was released'
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    name: Release gem to RubyGems.org
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.released }}

    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: write
      pull-requests: write

    steps:
      - name: Setup Git
        run: |
          git config --global user.email "${{ inputs.git_user_email }}"
          git config --global user.name "${{ inputs.git_user_name }}"

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Ruby
        id: setup-ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby_version }}
          bundler-cache: false

      - name: Fix Ruby 4.x bundler permissions
        working-directory: ${{ inputs.working_directory }}
        run: |
          ruby_version="${{ steps.setup-ruby.outputs.ruby-version }}"
          gems_dir="$RUNNER_TOOL_CACHE/Ruby/${ruby_version}/x64/lib/ruby/gems"
          if [ -d "$gems_dir" ]; then
            for dir in "$gems_dir"/*; do
              if [ -d "$dir" ]; then
                chmod +t "$dir" 2>/dev/null || true
              fi
            done
          fi

      - name: Configure Bundler
        working-directory: ${{ inputs.working_directory }}
        run: bundle config set frozen false

      - name: Install dependencies
        run: bundle install

      - name: Record starting branch
        id: start
        run: echo "branch=$(git branch --show-current)" >> $GITHUB_OUTPUT

      - name: Configure trusted publishing credentials
        if: inputs.dry_run != true
        uses: rubygems/configure-rubygems-credentials@v2.1.0

      # build:checksum and release share the same `build` prerequisite, so a
      # single rake invocation builds once and writes checksums/ before pushing.
      - name: Release gem to RubyGems
        if: inputs.dry_run != true
        working-directory: ${{ inputs.working_directory }}
        run: bundle exec rake build:checksum release

      # Must run after the build: the version is read from the gem that was
      # actually produced, which reissue may have bumped during `build`.
      - name: Get version being released
        id: version
        if: inputs.dry_run != true
        working-directory: ${{ inputs.working_directory }}
        run: |
          gem_file=$(ls -t pkg/*.gem 2>/dev/null | head -1)
          if [ -z "$gem_file" ]; then
            echo "::error::No gem found in pkg/ - the release step did not build one"
            exit 1
          fi
          version=$(ruby -e 'require "rubygems/package"; puts Gem::Package.new(ARGV[0]).spec.version' "$gem_file")
          echo "released=$version" >> $GITHUB_OUTPUT
          echo "Released version: $version"

      - name: Wait for release to propagate
        if: inputs.dry_run != true
        working-directory: ${{ inputs.working_directory }}
        run: gem exec rubygems-await pkg/*.gem

      - name: Dry run - skip RubyGems publish
        if: inputs.dry_run == true
        working-directory: ${{ inputs.working_directory }}
        run: echo "Dry run - no gem was built and nothing was published. The version is not known until a real run builds the gem."

      - name: Check for branch change after release
        id: release_branch
        run: |
          current_branch=$(git branch --show-current)
          echo "branch=$current_branch" >> $GITHUB_OUTPUT
          if [ "${{ steps.start.outputs.branch }}" != "$current_branch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit any uncommitted changes and create branch
        if: steps.release_branch.outputs.changed == 'false'
        id: manual_branch
        working-directory: ${{ inputs.working_directory }}
        run: |
          git add -A .
          if ! git diff --cached --quiet; then
            branch_name="post-release/$(date +%Y%m%d%H%M%S)"
            git checkout -b "$branch_name"
            git commit -m "Bump version for next release"
            echo "branch=$branch_name" >> $GITHUB_OUTPUT
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Push and create PR
        if: steps.release_branch.outputs.changed == 'true' || steps.manual_branch.outputs.created == 'true'
        run: |
          if [ "${{ steps.release_branch.outputs.changed }}" == "true" ]; then
            branch="${{ steps.release_branch.outputs.branch }}"
          else
            branch="${{ steps.manual_branch.outputs.branch }}"
          fi
          git push -u origin "$branch"
          gh pr create \
            --title "Bump version for next release" \
            --body "Post-release version bump created by reissue rake task." \
            --base ${{ github.event.repository.default_branch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
