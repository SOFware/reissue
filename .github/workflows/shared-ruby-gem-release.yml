name: Shared Ruby Gem Release

on:
  workflow_call:
    inputs:
      git_user_email:
        description: 'Git user email for commits'
        required: false
        type: string
        default: 'github-actions[bot]@users.noreply.github.com'
      git_user_name:
        description: 'Git user name for commits'
        required: false
        type: string
        default: 'github-actions[bot]'

jobs:
  release:
    name: Release gem to RubyGems.org
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: write
      pull-requests: write

    steps:
      - name: Setup Git
        run: |
          git config --global user.email "${{ inputs.git_user_email }}"
          git config --global user.name "${{ inputs.git_user_name }}"

      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Configure Bundler
        run: bundle config set frozen false

      # Finalize changelog and build gem - rake tasks handle branching per project config
      - name: Finalize and build gem
        run: bundle exec rake build:checksum

      # Commit any finalization changes on main
      - name: Commit finalization changes
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Finalize changelog for release"
          fi

      # Release gem using official RubyGems action
      - name: Release gem to RubyGems
        uses: rubygems/release-gem@v1

      # Bump version for next development cycle - rake task creates branch if configured
      - name: Bump version
        id: bump
        run: |
          starting_branch=$(git branch --show-current)
          bundle exec rake reissue
          current_branch=$(git branch --show-current)
          echo "branch=$current_branch" >> $GITHUB_OUTPUT
          if [ "$starting_branch" != "$current_branch" ]; then
            echo "needs_pr=true" >> $GITHUB_OUTPUT
          else
            echo "needs_pr=false" >> $GITHUB_OUTPUT
          fi

      # Push and create PR if rake task created a new branch
      - name: Push branch and create PR
        if: steps.bump.outputs.needs_pr == 'true'
        run: |
          git push -u origin ${{ steps.bump.outputs.branch }}
          gh pr create \
            --title "Bump version for next release" \
            --body "Post-release version bump created by reissue rake task." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
