name: Shared Ruby Gem Release

on:
  workflow_call:
    inputs:
      git_user_email:
        description: 'Git user email for commits'
        required: false
        type: string
        default: 'github-actions[bot]@users.noreply.github.com'
      git_user_name:
        description: 'Git user name for commits'
        required: false
        type: string
        default: 'github-actions[bot]'
      default_branch:
        description: 'Default branch name'
        required: false
        type: string
        default: 'main'
      reissue_task:
        description: 'Name of the reissue rake task'
        required: false
        type: string
        default: 'reissue'
    outputs:
      version:
        description: 'The version that was released'
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    name: Release gem to RubyGems.org
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.released }}

    permissions:
      id-token: write  # Required for Trusted Publishing
      contents: write
      pull-requests: write

    steps:
      - name: Setup Git
        run: |
          git config --global user.email "${{ inputs.git_user_email }}"
          git config --global user.name "${{ inputs.git_user_name }}"

      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.default_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Configure Bundler
        run: bundle config set frozen false

      - name: Finalize and build gem
        run: bundle exec rake build:checksum

      - name: Get version being released
        id: version
        run: |
          version=$(ls pkg/*.gem | head -1 | sed 's/.*-\([0-9][^-]*\)\.gem/\1/')
          echo "released=$version" >> $GITHUB_OUTPUT

      - name: Commit finalization changes
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Finalize version ${{ steps.version.outputs.released }} for release"
          fi

      - name: Release gem to RubyGems
        uses: rubygems/release-gem@v1

      - name: Bump version for next cycle
        id: bump
        run: |
          set -e
          starting_branch=$(git branch --show-current)
          bundle exec rake ${{ inputs.reissue_task }}
          current_branch=$(git branch --show-current)
          echo "branch=$current_branch" >> $GITHUB_OUTPUT
          if [ "$starting_branch" != "$current_branch" ]; then
            echo "needs_pr=true" >> $GITHUB_OUTPUT
          else
            echo "needs_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit version bump if on same branch
        if: steps.bump.outputs.needs_pr == 'false'
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Bump version for next release"
          fi

      - name: Push and create PR
        if: steps.bump.outputs.needs_pr == 'true'
        run: |
          git push -u origin ${{ steps.bump.outputs.branch }}
          gh pr create \
            --title "Bump version for next release" \
            --body "Post-release version bump created by reissue rake task." \
            --base ${{ inputs.default_branch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to default branch
        if: steps.bump.outputs.needs_pr == 'false'
        run: git push origin ${{ inputs.default_branch }}
